name: stc-sm

services:
  # ---- PostgreSQL ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teu_armario_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-teu_armario_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ---- Spring Boot backend (REST + WebSocket) ------------------------------
  backend:
    build:
      context: ./code/jvm/STC-SM-Backend
    environment:
      # Spring relaxed binding maps these env vars onto application properties.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-teu_armario_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${DDL_AUTO:-update}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ---- Back-office web app (nginx: static + /api & /ws-simulator proxy) -----
  web:
    build:
      context: ./code/web
      args:
        # Empty API base => relative /api requests, proxied by this container's nginx.
        VITE_API_BASE: ${WEB_VITE_API_BASE-}
        # Must match how the browser reaches THIS app (host:WEB_PORT).
        VITE_WS_URL: ${WEB_VITE_WS_URL:-ws://localhost:8081/ws-simulator}
    ports:
      - "${WEB_PORT:-8081}:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Cabinet/tool simulator (nginx: static + /api & /ws-simulator proxy) --
  simulator:
    build:
      context: ./code/simulator
      args:
        VITE_API_BASE: ${SIM_VITE_API_BASE-}
        VITE_WS_URL: ${SIM_VITE_WS_URL:-ws://localhost:8082/ws-simulator}
    ports:
      - "${SIM_PORT:-8082}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
