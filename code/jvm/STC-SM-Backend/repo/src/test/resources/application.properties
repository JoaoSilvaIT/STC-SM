# Configuration of the test database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/teu_armario_db
spring.datasource.username=postgres
spring.datasource.password=tua_password

# Show what SQL queries are being executed in the console
spring.jpa.show-sql=true

# Hibernate DDL auto to not maintain the schema, because this is a test environment and we want to ensure that the schema is updated according to the entities
spring.jpa.hibernate.ddl-auto=create-drop