# In-memory H2 (PostgreSQL compatibility mode) so the JPA slice tests run without an external database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Build the schema from the entities for each test run
spring.jpa.hibernate.ddl-auto=create-drop

# Show the SQL queries being executed in the console
spring.jpa.show-sql=true
